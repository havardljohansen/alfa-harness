    type: "Low-beam relay  ↗ Front-clip module"
    pinlabels: ["86"]
    bgcolor: "#2a2118"
  rly-high:
    type: "High-beam relay  ↗ Front-clip module"
    pinlabels: ["86", "87"]
    bgcolor: "#2a2118"
  wl-main:
    type: "Tell-tale — main beam (blue)"
    pinlabels: ["in"]
  park-fl:
    type: "Front position/park LEFT  ↗ Front-clip module"
    pinlabels: ["58"]
    bgcolor: "#2a2118"
  tail-rl:
    type: "Tail/position + brake LEFT  ↗ Rear / boot module"
    pinlabels: ["58"]
    bgcolor: "#2a2118"
  wl-park:
    type: "Tell-tale — position/parking (green)"
    pinlabels: ["in", "g"]
  rtmr-ign:
    type: "Cabin IGNITION bus (RTMR, bussed)  ↗ Main loom (engine-bay hub)"
    pinlabels: ["f-ign-4", "f-ign-2", "f-ign-3", "f-ign-10"]
    bgcolor: "#2a2118"
  sw-turn:
    type: "Turn-signal switch (column) — WEAK CONTACT"
    pinlabels: ["in", "L", "R"]
  rly-turnL:
    type: "Turn-signal LEFT relay  ↗ Main loom (engine-bay hub)"
    pinlabels: ["86", "87"]
    bgcolor: "#2a2118"
  rly-turnR:
    type: "Turn-signal RIGHT relay  ↗ Main loom (engine-bay hub)"
    pinlabels: ["86", "87"]
    bgcolor: "#2a2118"
  wl-turn:
    type: "Tell-tale — turn (green)"
    pinlabels: ["L", "R"]
  sw-hazard:
    type: "Hazard switch (added — in the old cigar-lighter location)"
    pinlabels: ["30", "L", "R"]
  g-fuel:
    type: "Fuel gauge (Veglia)"
    pinlabels: ["+", "s", "ill", "g"]
  snd-fuel:
    type: "Fuel-tank sender  ↗ Rear / boot module"
    pinlabels: ["s"]
    bgcolor: "#2a2118"
  snd-temp:
    type: "Coolant-temp sender  ↗ Main loom (engine-bay hub)"
    pinlabels: ["s"]
    bgcolor: "#2a2118"
  g-temp:
    type: "Coolant-temp gauge"
    pinlabels: ["s"]
  snd-oil:
    type: "Oil-pressure gauge sender  ↗ Main loom (engine-bay hub)"
    pinlabels: ["s"]
    bgcolor: "#2a2118"
  g-oil:
    type: "Oil-pressure gauge"
    pinlabels: ["s"]
  sw-oillight:
    type: "Oil-pressure warning switch  ↗ Main loom (engine-bay hub)"
    pinlabels: ["s"]
    bgcolor: "#2a2118"
  wl-oil:
    type: "Warning — oil pressure"
    pinlabels: ["s", "+"]
  coil:
    type: "Ignition coil  ↗ Main loom (engine-bay hub)"
    pinlabels: ["1"]
    bgcolor: "#2a2118"
  g-tach:
    type: "Tachometer"
    pinlabels: ["sig"]
  instr-pwm:
    type: "Instrument-light PWM dimmer module  ↗ Main loom (engine-bay hub)"
    pinlabels: ["out"]
    bgcolor: "#2a2118"
  rly-horn:
    type: "Horn relay  ↗ Main loom (engine-bay hub)"
    pinlabels: ["86"]
    bgcolor: "#2a2118"
  sw-horn:
    type: "Horn button"
    pinlabels: ["in", "g"]
  int-light:
    type: "Interior / courtesy light"
    pinlabels: ["+", "sw"]
  sw-door-l:
    type: "Door switch LEFT"
    pinlabels: ["in"]
  sw-door-r:
    type: "Door switch RIGHT"
    pinlabels: ["in"]
  g-afr:
    type: "AFR gauge (future)"
    pinlabels: ["+", "sig"]
  o2-sensor:
    type: "Wideband O2 sensor (future)  ↗ Main loom (engine-bay hub)"
    pinlabels: ["sig"]
    bgcolor: "#2a2118"

