    pinlabels: ["BUS", "f-con-4", "f-con-1", "f-con-6"]
    bgcolor: "#2a2118"
  rly-ignmain:
    type: "Ignition main relay  ↗ Main loom (engine-bay hub)"
    pinlabels: ["86"]
    bgcolor: "#2a2118"
  sw-headlight:
    type: "Headlight / position switch"
    pinlabels: ["30i", "56", "30c", "58"]
  sw-dipflash:
    type: "Dip / flash (column)"
    pinlabels: ["56", "flash", "56b", "56a"]
