    type: "Ground block — front clip  ↗ Front-clip module"
    pinlabels: ["g"]
    bgcolor: "#2a2118"
  gnd-dash:
    type: "Ground block — dash  ↗ Dashboard module"
    pinlabels: ["g"]
    bgcolor: "#2a2118"
  gnd-rear:
    type: "Ground block — rear / boot  ↗ Rear / boot module"
    pinlabels: ["g"]
    bgcolor: "#2a2118"
  alternator:
    type: "Alternator (internally regulated)"
    pinlabels: ["B+", "D+", "g"]
  wl-charge:
    type: "Warning — charge (alternator)  ↗ Dashboard module"
    pinlabels: ["d"]
    bgcolor: "#2a2118"
  starter:
    type: "Starter motor + solenoid"
    pinlabels: ["B+", "50"]
  ign-switch:
    type: "Ignition switch  ↗ Dashboard module"
    pinlabels: ["50", "30", "15"]
    bgcolor: "#2a2118"
  rly-starter:
    type: "Starter relay"
    pinlabels: ["86", "30", "87"]
  coil:
    type: "Ignition coil"
    pinlabels: ["15", "1"]
  dist:
    type: "Distributor"
    pinlabels: ["1"]
  sw-headlight:
    type: "Headlight / position switch  ↗ Dashboard module"
    pinlabels: ["30c"]
    bgcolor: "#2a2118"
  flasher:
