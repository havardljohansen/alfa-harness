    pinlabels: ["high", "low"]
    bgcolor: "#2a2118"
  rly-fan:
    type: "Heater-fan relay (HIGH)"
    pinlabels: ["86", "87", "30"]
  fan-resistor:
    type: "Heater-fan PWM / resistor module (low speed, optional)"
    pinlabels: ["en", "pwr", "out"]
  heater-fan:
    type: "Heater blower fan (single speed)"
    pinlabels: ["in", "g"]
  rly-fuel:
    type: "Fuel-pump relay"
