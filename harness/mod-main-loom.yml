    bgcolor: "#2a2118"
  instr-pwm:
    type: "Instrument-light PWM dimmer module"
    pinlabels: ["lo", "hi", "out", "g"]
  sw-wiper:
    type: "Wiper switch (3-position) — DEDICATED, low-current  ↗ 3-way switch cluster (firewall)"
    pinlabels: ["in", "low", "high"]
    bgcolor: "#2a2118"
  rly-wlow:
