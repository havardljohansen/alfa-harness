# Auto-generated — Main loom (engine-bay hub). Do not edit by hand.
# One wire colour (silicone, tinned) — identity is the Dymo label per wire.

connectors:
  battery:
    type: "Battery (12 V, neg. ground)"
    pinlabels: ["+", "-"]
  rtmr-const:
    type: "CONSTANT (battery) bus (RTMR, bussed)"
    pinlabels: ["BUS", "f-con-4", "f-con-8", "f-con-1", "f-con-3", "f-con-2", "f-con-6"]
  pdm:
    type: "Headlight power centre (PDM)  ↗ Front-clip module"
    pinlabels: ["BUS"]
    bgcolor: "#2a2118"
  gnd-eng:
    type: "Ground HUB — engine bay / battery"
    pinlabels: ["g"]
  rly-ignmain:
    type: "Ignition main relay"
    pinlabels: ["87", "86", "30"]
  rtmr-ign:
    type: "Cabin IGNITION bus (RTMR, bussed)"
    pinlabels: ["BUS", "f-ign-1", "f-ign-4", "f-ign-7", "f-ign-2", "f-ign-3", "f-ign-9", "f-ign-5", "f-ign-6", "f-ign-8", "f-ign-10"]
